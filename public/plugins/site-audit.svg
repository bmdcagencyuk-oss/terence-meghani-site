<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Site Audit — preview">
  <title>Site Audit — automated SEO &amp; performance audit with lead capture</title>
  <defs>
    <linearGradient id="sa-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2122"/><stop offset="1" stop-color="#16181a"/>
    </linearGradient>
    <filter id="sa-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- PageSpeed score gauges -->
    <linearGradient id="sa-good" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="sa-warn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="sa-bad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef4444"/><stop offset="1" stop-color="#f87171"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#sa-bg)"/>

  <g transform="translate(80,80)" filter="url(#sa-shadow)">
    <rect width="1440" height="840" rx="12" fill="#0E1011" stroke="rgba(255,255,255,0.08)"/>

    <!-- Browser chrome -->
    <rect width="1440" height="44" rx="12" fill="#1A1C1E"/>
    <rect y="22" width="1440" height="22" fill="#1A1C1E"/>
    <circle cx="22" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="44" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="66" cy="22" r="6" fill="#28C840"/>
    <text x="720" y="27" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#888" letter-spacing="0.04em">marketing-agency.co.uk/free-audit</text>

    <!-- ===== LEFT SIDE: Audit form on the agency page ===== -->
    <g transform="translate(40,80)">
      <rect width="600" height="720" rx="10" fill="#1A1C1E"/>

      <g transform="translate(40,40)" font-family="-apple-system,sans-serif">
        <!-- Agency mini-logo -->
        <text x="0" y="0" font-size="11" fill="#FF4D17" letter-spacing="0.18em" font-weight="700">YOUR AGENCY · TOOLS</text>
        <text x="0" y="40" font-size="32" fill="#fff" font-weight="500" letter-spacing="-0.01em">Free site audit.</text>
        <text x="0" y="74" font-size="32" fill="rgba(255,255,255,0.5)" font-weight="500" font-style="italic" letter-spacing="-0.01em">90 seconds. Real data.</text>

        <text x="0" y="118" font-size="14" fill="rgba(255,255,255,0.5)" >We'll run your site through Google PageSpeed,</text>
        <text x="0" y="138" font-size="14" fill="rgba(255,255,255,0.5)">flag your top SEO + performance issues, and</text>
        <text x="0" y="158" font-size="14" fill="rgba(255,255,255,0.5)">show you the headlines instantly.</text>

        <!-- Form -->
        <g transform="translate(0,200)">
          <text font-size="11" fill="#888" letter-spacing="0.16em" font-weight="600">YOUR WEBSITE URL</text>
          <rect y="14" width="520" height="56" rx="4" fill="#0E1011" stroke="rgba(255,255,255,0.12)"/>
          <text x="20" y="48" font-size="16" fill="#fff" font-family="ui-monospace,monospace">https://my-business-site.co.uk</text>
        </g>

        <g transform="translate(0,304)">
          <text font-size="11" fill="#888" letter-spacing="0.16em" font-weight="600">YOUR EMAIL</text>
          <rect y="14" width="520" height="56" rx="4" fill="#0E1011" stroke="rgba(255,255,255,0.12)"/>
          <text x="20" y="48" font-size="16" fill="#fff">sarah@my-business.co.uk</text>
        </g>

        <g transform="translate(0,408)">
          <rect width="520" height="60" rx="4" fill="#FF4D17"/>
          <text x="260" y="38" text-anchor="middle" font-size="14" fill="#fff" font-weight="700" letter-spacing="0.14em">RUN MY FREE AUDIT →</text>
        </g>
        <text x="260" y="490" text-anchor="middle" font-size="11" fill="#888">Results in under 90 seconds. We'll email you the full report.</text>

        <!-- Privacy note -->
        <g transform="translate(0,530)">
          <rect width="520" height="80" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
          <text x="20" y="26" font-size="11" fill="#888" letter-spacing="0.14em" font-weight="600">WHAT WE CHECK</text>
          <text x="20" y="48" font-size="12" fill="rgba(255,255,255,0.7)">SEO basics · Core Web Vitals · Mobile usability · </text>
          <text x="20" y="64" font-size="12" fill="rgba(255,255,255,0.7)">Image weight · Render-blocking JS · Security headers</text>
        </g>
      </g>
    </g>

    <!-- ===== RIGHT SIDE: Teaser results screen (gated) ===== -->
    <g transform="translate(680,80)">
      <rect width="720" height="720" rx="10" fill="#0A0C0E"/>

      <g transform="translate(40,40)" font-family="-apple-system,sans-serif">
        <text x="0" y="0" font-size="11" fill="#10b981" letter-spacing="0.16em" font-weight="700">✓ AUDIT COMPLETE · 87 SECONDS</text>
        <text x="0" y="36" font-size="20" fill="#fff" font-weight="500">my-business-site.co.uk</text>

        <!-- 4 score gauges -->
        <g transform="translate(0,72)">
          <!-- Performance: 38 (red) -->
          <g>
            <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="url(#sa-bad)" stroke-width="8" stroke-dasharray="119 314" stroke-dashoffset="0" transform="rotate(-90 60 60)" stroke-linecap="round"/>
            <text x="60" y="58" text-anchor="middle" font-size="32" fill="#fff" font-weight="700">38</text>
            <text x="60" y="78" text-anchor="middle" font-size="10" fill="#888" letter-spacing="0.14em" font-weight="600">PERFORMANCE</text>
            <text x="60" y="148" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">Needs work</text>
          </g>
          <!-- Accessibility: 81 (warning) -->
          <g transform="translate(160,0)">
            <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="url(#sa-warn)" stroke-width="8" stroke-dasharray="254 314" stroke-dashoffset="0" transform="rotate(-90 60 60)" stroke-linecap="round"/>
            <text x="60" y="58" text-anchor="middle" font-size="32" fill="#fff" font-weight="700">81</text>
            <text x="60" y="78" text-anchor="middle" font-size="10" fill="#888" letter-spacing="0.14em" font-weight="600">ACCESS.</text>
            <text x="60" y="148" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="600">OK</text>
          </g>
          <!-- Best Practices: 92 (good) -->
          <g transform="translate(320,0)">
            <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="url(#sa-good)" stroke-width="8" stroke-dasharray="289 314" stroke-dashoffset="0" transform="rotate(-90 60 60)" stroke-linecap="round"/>
            <text x="60" y="58" text-anchor="middle" font-size="32" fill="#fff" font-weight="700">92</text>
            <text x="60" y="78" text-anchor="middle" font-size="10" fill="#888" letter-spacing="0.14em" font-weight="600">BEST PRAC.</text>
            <text x="60" y="148" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">Good</text>
          </g>
          <!-- SEO: 64 (warning) -->
          <g transform="translate(480,0)">
            <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="url(#sa-warn)" stroke-width="8" stroke-dasharray="201 314" stroke-dashoffset="0" transform="rotate(-90 60 60)" stroke-linecap="round"/>
            <text x="60" y="58" text-anchor="middle" font-size="32" fill="#fff" font-weight="700">64</text>
            <text x="60" y="78" text-anchor="middle" font-size="10" fill="#888" letter-spacing="0.14em" font-weight="600">SEO</text>
            <text x="60" y="148" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="600">Needs work</text>
          </g>
        </g>

        <!-- Top issues teaser (partially blurred) -->
        <g transform="translate(0,260)">
          <text x="0" y="0" font-size="14" fill="#fff" font-weight="600">Top 5 issues we found</text>
          <text x="0" y="20" font-size="11" fill="#888">Showing 2 of 5 · Get the full list below</text>

          <!-- Issue 1: visible -->
          <g transform="translate(0,42)">
            <rect width="640" height="68" rx="6" fill="#1A1C1E"/>
            <rect width="4" height="68" fill="#ef4444"/>
            <text x="20" y="22" font-size="11" fill="#ef4444" letter-spacing="0.14em" font-weight="700">CRITICAL · PERFORMANCE</text>
            <text x="20" y="42" font-size="13" fill="#fff" font-weight="500">Largest Contentful Paint is 4.8s on mobile</text>
            <text x="20" y="60" font-size="11" fill="#888">Hero image (2.3MB) is the bottleneck. Estimated saving: 2.6s.</text>
          </g>

          <!-- Issue 2: visible -->
          <g transform="translate(0,122)">
            <rect width="640" height="68" rx="6" fill="#1A1C1E"/>
            <rect width="4" height="68" fill="#f59e0b"/>
            <text x="20" y="22" font-size="11" fill="#f59e0b" letter-spacing="0.14em" font-weight="700">WARNING · SEO</text>
            <text x="20" y="42" font-size="13" fill="#fff" font-weight="500">9 pages missing meta descriptions</text>
            <text x="20" y="60" font-size="11" fill="#888">Including your homepage and top 3 service pages.</text>
          </g>

          <!-- Issue 3-5: blurred (the gate) -->
          <g transform="translate(0,202)" opacity="0.3">
            <rect width="640" height="68" rx="6" fill="#1A1C1E"/>
            <rect width="4" height="68" fill="#888"/>
            <rect x="20" y="14" width="240" height="10" rx="2" fill="#444"/>
            <rect x="20" y="36" width="400" height="12" rx="2" fill="#666"/>
            <rect x="20" y="54" width="320" height="8" rx="2" fill="#444"/>
          </g>
          <g transform="translate(0,278)" opacity="0.2">
            <rect width="640" height="68" rx="6" fill="#1A1C1E"/>
            <rect width="4" height="68" fill="#888"/>
            <rect x="20" y="14" width="240" height="10" rx="2" fill="#444"/>
            <rect x="20" y="36" width="400" height="12" rx="2" fill="#666"/>
            <rect x="20" y="54" width="320" height="8" rx="2" fill="#444"/>
          </g>

          <!-- Gate CTA -->
          <g transform="translate(0,360)">
            <rect width="640" height="56" rx="4" fill="#FF4D17"/>
            <text x="320" y="36" text-anchor="middle" font-size="14" fill="#fff" font-weight="700" letter-spacing="0.14em">UNLOCK FULL REPORT (FREE) →</text>
          </g>
          <text x="320" y="436" text-anchor="middle" font-size="11" fill="#888">PDF + 30-min consult booking · Sent to sarah@my-business.co.uk</text>
        </g>
      </g>
    </g>

    <!-- Powered-by note -->
    <g transform="translate(40,808)">
      <text font-family="JetBrains Mono,monospace" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="0.16em">POWERED BY GOOGLE PAGESPEED INSIGHTS · ENABLE YOUR API KEY FOR UNLIMITED RUNS</text>
    </g>
  </g>

  <text x="800" y="970" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.18em">SITE AUDIT · LEAD CAPTURE · PAGESPEED RESULTS · TEASE-AND-GATE FLOW</text>
</svg>
