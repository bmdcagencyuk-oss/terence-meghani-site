<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="StoraX — Stora API integration preview">
  <title>StoraX — Stora API integration with native on-site booking</title>
  <defs>
    <linearGradient id="sx-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2122"/><stop offset="1" stop-color="#16181a"/>
    </linearGradient>
    <filter id="sx-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sx-bg)"/>

  <!-- Two-pane composition: WP admin (left) + frontend booking (right) -->

  <!-- ===== LEFT: WordPress admin showing Stora connection ===== -->
  <g transform="translate(80,90)" filter="url(#sx-shadow)">
    <rect width="700" height="820" rx="10" fill="#ffffff"/>
    <!-- WP admin bar mimic -->
    <rect width="700" height="36" rx="10" fill="#1d2327"/>
    <rect y="22" width="700" height="14" fill="#1d2327"/>
    <text x="20" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#a7aaad">📊 Storage Operator Site</text>
    <circle cx="640" cy="18" r="9" fill="none" stroke="#a7aaad" stroke-width="1.5"/>

    <!-- Left admin nav rail -->
    <rect y="36" width="160" height="784" fill="#1d2327"/>
    <g font-family="-apple-system,sans-serif" font-size="13" fill="#c3c4c7">
      <text x="20" y="76">Dashboard</text>
      <text x="20" y="106">Posts</text>
      <text x="20" y="136">Pages</text>
      <text x="20" y="166">Plugins</text>
      <!-- StoraX (active) -->
      <rect x="0" y="184" width="160" height="32" fill="#2271b1"/>
      <text x="20" y="206" fill="#fff" font-weight="600">StoraX</text>
      <text x="20" y="246">Settings</text>
    </g>

    <!-- Main content area -->
    <g transform="translate(180,60)" font-family="-apple-system,sans-serif">
      <text x="0" y="0" font-size="24" fill="#1d2327" font-weight="500">StoraX → Connection</text>
      <text x="0" y="24" font-size="13" fill="#646970">Connect WordPress to your Stora account.</text>

      <!-- Status pill: connected -->
      <g transform="translate(0,52)">
        <rect width="500" height="60" rx="6" fill="#ecfdf5" stroke="#10b981"/>
        <circle cx="28" cy="30" r="8" fill="#10b981"/>
        <path d="M 24 30 L 27 33 L 33 27" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="50" y="26" font-size="14" fill="#065f46" font-weight="600">Connected to Stora · API v3</text>
        <text x="50" y="46" font-size="12" fill="#047857">12 unit types · 89 units · last sync 2 minutes ago</text>
      </g>

      <!-- Tab strip -->
      <g transform="translate(0,138)">
        <rect width="500" height="36" fill="none"/>
        <line x1="0" y1="35" x2="500" y2="35" stroke="#e5e7eb"/>
        <text x="0"   y="22" font-size="13" fill="#0f172a" font-weight="600">Connection</text>
        <line x1="0" y1="35" x2="92" y2="35" stroke="#FF4D17" stroke-width="2"/>
        <text x="110" y="22" font-size="13" fill="#94a3b8">Design</text>
        <text x="180" y="22" font-size="13" fill="#94a3b8">Booking</text>
        <text x="260" y="22" font-size="13" fill="#94a3b8">Webhooks</text>
        <text x="360" y="22" font-size="13" fill="#94a3b8">Shortcodes</text>
      </g>

      <!-- Form -->
      <g transform="translate(0,200)" font-size="13">
        <text fill="#374151" font-weight="500">API Key</text>
        <rect y="10" width="500" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb"/>
        <text x="14" y="36" font-family="ui-monospace,monospace" fill="#0f172a" font-size="12">stora_pk_live_••••••••••••••••••••3a4f</text>
        <text x="486" y="36" text-anchor="end" font-family="ui-monospace,monospace" fill="#10b981" font-size="11" font-weight="600">VALID</text>

        <g transform="translate(0,72)">
          <text fill="#374151" font-weight="500">Default Location</text>
          <rect y="10" width="240" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb"/>
          <text x="14" y="36" fill="#0f172a">Nottingham (Lenton)</text>
          <polygon points="220,30 230,30 225,36" fill="#94a3b8"/>
          <g transform="translate(260,0)">
            <text fill="#374151" font-weight="500">Currency</text>
            <rect y="10" width="240" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb"/>
            <text x="14" y="36" fill="#0f172a">GBP (£)</text>
            <polygon points="220,30 230,30 225,36" fill="#94a3b8"/>
          </g>
        </g>

        <g transform="translate(0,144)">
          <rect width="500" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
          <text x="20" y="26" font-size="13" fill="#92400e" font-weight="600">⚡ Native on-site booking enabled</text>
          <text x="20" y="46" font-size="12" fill="#92400e">Customer stays on your domain — Stora handles only the PCI card step.</text>
        </g>

        <g transform="translate(0,234)">
          <rect width="500" height="38" rx="4" fill="#FF4D17"/>
          <text x="250" y="25" text-anchor="middle" font-size="13" fill="#fff" font-weight="600" letter-spacing="0.04em">Save Connection</text>
        </g>
      </g>

      <!-- Last sync log preview -->
      <g transform="translate(0,496)" font-size="11" font-family="ui-monospace,monospace">
        <text fill="#94a3b8" font-weight="600" letter-spacing="0.16em" font-family="-apple-system,sans-serif" font-size="11">RECENT API ACTIVITY</text>
        <g transform="translate(0,16)">
          <rect width="500" height="120" rx="4" fill="#0f172a"/>
          <text x="14" y="22" fill="#10b981">[15:42:31]</text><text x="80" y="22" fill="#cbd5e1">GET /units → 200 · 89 units returned</text>
          <text x="14" y="42" fill="#10b981">[15:42:30]</text><text x="80" y="42" fill="#cbd5e1">GET /unit-types → 200 · 12 types</text>
          <text x="14" y="62" fill="#10b981">[15:40:12]</text><text x="80" y="62" fill="#cbd5e1">POST /webhook/order.completed → 200</text>
          <text x="14" y="82" fill="#10b981">[15:38:04]</text><text x="80" y="82" fill="#cbd5e1">GET /availability/utype_4f3a → 200</text>
          <text x="14" y="102" fill="#94a3b8">[15:30:00]</text><text x="80" y="102" fill="#94a3b8">scheduled sync · 1.2s</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ===== RIGHT: live frontend showing booking flow ===== -->
  <g transform="translate(820,90)" filter="url(#sx-shadow)">
    <rect width="700" height="820" rx="10" fill="#0E1011" stroke="rgba(255,255,255,0.08)"/>
    <rect width="700" height="44" rx="10" fill="#1A1C1E"/>
    <rect y="22" width="700" height="22" fill="#1A1C1E"/>
    <circle cx="22" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="44" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="66" cy="22" r="6" fill="#28C840"/>
    <text x="350" y="27" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#888" letter-spacing="0.04em">stora-operator.co.uk/book/utype_4f3a</text>

    <g transform="translate(40,80)" font-family="-apple-system,sans-serif">
      <text x="0" y="0" font-size="11" fill="#FF4D17" letter-spacing="0.16em" font-weight="600">STEP 2 OF 4 · YOUR DETAILS</text>
      <text x="0" y="38" font-size="28" fill="#fff" font-weight="500" letter-spacing="-0.01em">A few details, then we book the unit.</text>
      <text x="0" y="64" font-size="13" fill="rgba(255,255,255,0.5)">Stays on this site until card entry · Powered by Stora</text>

      <!-- Selected unit card -->
      <g transform="translate(0,96)">
        <rect width="620" height="80" rx="6" fill="#1A1C1E"/>
        <rect width="4" height="80" rx="2" fill="#FF4D17"/>
        <rect x="20" y="16" width="48" height="48" fill="#252729" rx="3"/>
        <polygon transform="translate(28,24) scale(0.5)" points="0,40 60,10 120,40 60,70 0,40 0,90 60,120 60,70 120,40 120,90 60,120" fill="none" stroke="#666" stroke-width="2"/>
        <text x="80" y="34" font-size="11" fill="#888" letter-spacing="0.12em" font-weight="600">UNIT TYPE · Indoor 25 sq ft</text>
        <text x="80" y="56" font-size="14" fill="#fff" font-weight="600">£98 / month · 6-month minimum · ground floor access</text>
        <text x="600" y="48" text-anchor="end" font-size="11" fill="#10b981" letter-spacing="0.12em" font-weight="600">AVAILABLE</text>
      </g>

      <!-- Form fields with focus state -->
      <g transform="translate(0,200)">
        <text font-size="10" fill="#888" letter-spacing="0.14em" font-weight="600">FULL NAME</text>
        <rect y="10" width="620" height="44" rx="4" fill="#1A1C1E" stroke="#FF4D17" stroke-width="1.5"/>
        <text x="14" y="38" font-size="14" fill="#fff">Mark Davies</text>

        <g transform="translate(0,76)">
          <text font-size="10" fill="#888" letter-spacing="0.14em" font-weight="600">EMAIL</text>
          <rect y="10" width="300" height="44" rx="4" fill="#1A1C1E" stroke="rgba(255,255,255,0.08)"/>
          <text x="14" y="38" font-size="14" fill="#fff">mark@studio.co.uk</text>
          <g transform="translate(320,0)">
            <text font-size="10" fill="#888" letter-spacing="0.14em" font-weight="600">PHONE</text>
            <rect y="10" width="300" height="44" rx="4" fill="#1A1C1E" stroke="rgba(255,255,255,0.08)"/>
            <text x="14" y="38" font-size="14" fill="#fff">07700 900456</text>
          </g>
        </g>

        <!-- Add-ons section -->
        <g transform="translate(0,160)">
          <text font-size="11" fill="#888" letter-spacing="0.14em" font-weight="600">ADD INSURANCE</text>
          <g transform="translate(0,16)">
            <rect width="620" height="56" rx="6" fill="#1A1C1E" stroke="rgba(255,255,255,0.08)"/>
            <rect x="16" y="18" width="20" height="20" rx="3" fill="#FF4D17"/>
            <path d="M 20 28 L 24 32 L 32 24" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="50" y="32" font-size="14" fill="#fff" font-weight="500">Stora Cover · up to £5,000</text>
            <text x="600" y="32" text-anchor="end" font-size="14" fill="#fff" font-weight="600">£12/mo</text>
          </g>
        </g>

        <!-- Total + CTA -->
        <g transform="translate(0,260)">
          <rect width="620" height="60" rx="6" fill="#252729"/>
          <text x="20" y="26" font-size="11" fill="#888" letter-spacing="0.14em" font-weight="600">MONTHLY TOTAL</text>
          <text x="20" y="46" font-size="22" fill="#fff" font-weight="700">£110.00</text>
          <text x="600" y="40" text-anchor="end" font-size="11" fill="#888">Including 6-month commitment</text>
        </g>

        <g transform="translate(0,332)">
          <rect width="620" height="56" rx="4" fill="#FF4D17"/>
          <text x="310" y="36" text-anchor="middle" font-size="14" fill="#fff" font-weight="700" letter-spacing="0.14em">REVIEW &amp; CONTINUE TO PAYMENT →</text>
        </g>
        <text x="310" y="408" text-anchor="middle" font-size="11" fill="#666">Card entry happens on Stora's secure page (PCI requirement). Then back to your account.</text>
      </g>
    </g>
  </g>

  <text x="800" y="970" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.18em">STORAX · API CONNECTION · NATIVE ON-SITE BOOKING FLOW</text>
</svg>
