<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Client Approvals Hub — preview">
  <title>Client Approvals Hub — pinned annotations + breakpoint preview</title>
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2122"/><stop offset="1" stop-color="#16181a"/>
    </linearGradient>
    <filter id="ca-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#ca-bg)"/>

  <g transform="translate(80,80)" filter="url(#ca-shadow)">
    <rect width="1440" height="840" rx="12" fill="#0E1011" stroke="rgba(255,255,255,0.08)"/>

    <!-- Browser chrome -->
    <rect width="1440" height="44" rx="12" fill="#1A1C1E"/>
    <rect y="22" width="1440" height="22" fill="#1A1C1E"/>
    <circle cx="22" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="44" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="66" cy="22" r="6" fill="#28C840"/>
    <text x="720" y="27" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#888" letter-spacing="0.04em">approvals.your-agency.com/r/k4f3a-tokenised-link</text>
    <!-- Token-link indicator -->
    <g transform="translate(1300,12)">
      <rect width="120" height="22" rx="11" fill="rgba(255,77,23,0.15)" stroke="#FF4D17"/>
      <text x="60" y="16" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#FF4D17" letter-spacing="0.16em" font-weight="700">TOKEN AUTH</text>
    </g>

    <!-- Top header -->
    <g transform="translate(0,44)">
      <rect width="1440" height="68" fill="#0A0C0E"/>
      <text x="32" y="32" font-family="-apple-system,sans-serif" font-size="11" fill="#888" letter-spacing="0.16em" font-weight="600">YOUR AGENCY · APPROVAL #128</text>
      <text x="32" y="58" font-family="-apple-system,sans-serif" font-size="18" fill="#fff" font-weight="500">Homepage redesign — Round 2</text>

      <!-- Status pill -->
      <g transform="translate(740,18)">
        <rect width="160" height="32" rx="4" fill="rgba(255,184,0,0.15)" stroke="#FFB800"/>
        <text x="80" y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#FFB800" letter-spacing="0.14em" font-weight="700">AWAITING REVIEW</text>
      </g>
      <!-- Breakpoint switcher -->
      <g transform="translate(920,18)">
        <rect width="320" height="32" rx="4" fill="#1A1C1E"/>
        <!-- mobile -->
        <text x="48" y="20" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#888">📱 Mobile</text>
        <!-- tablet -->
        <text x="160" y="20" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#888">📊 Tablet</text>
        <!-- desktop (selected) -->
        <rect x="220" y="0" width="100" height="32" rx="4" fill="#FF4D17"/>
        <text x="270" y="20" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#fff" font-weight="600">🖥 Desktop</text>
      </g>
      <!-- AI button -->
      <g transform="translate(1264,18)">
        <rect width="148" height="32" rx="4" fill="#7A0FFF"/>
        <text x="74" y="20" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#fff" font-weight="600">✨ AI ASSISTANT</text>
      </g>
    </g>

    <!-- ===== Main: mockup with pinned annotations (left) + comments (right) ===== -->

    <!-- Left: mockup canvas -->
    <g transform="translate(40,140)">
      <!-- Mockup outer frame -->
      <rect width="900" height="660" rx="6" fill="#1A1C1E"/>
      <text x="20" y="22" font-family="-apple-system,sans-serif" font-size="11" fill="#888" letter-spacing="0.12em" font-weight="600">DESKTOP · 1440PX</text>
      <text x="880" y="22" text-anchor="end" font-family="-apple-system,sans-serif" font-size="11" fill="#888">3 of 5 pins resolved</text>

      <!-- Faux website mockup -->
      <g transform="translate(20,40)">
        <rect width="860" height="600" rx="4" fill="#fff"/>
        <!-- Site nav -->
        <rect width="860" height="56" fill="#0A0C0E"/>
        <text x="20" y="34" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="600">CLIENT BRAND</text>
        <text x="700" y="34" font-family="-apple-system,sans-serif" font-size="11" fill="#fff">Home · About · Services · Contact</text>

        <!-- Hero block -->
        <g transform="translate(0,56)">
          <rect width="860" height="220" fill="#F2ECE0"/>
          <rect x="40" y="60" width="380" height="14" fill="#0A0C0E" rx="2"/>
          <rect x="40" y="86" width="500" height="32" fill="#0A0C0E" rx="2"/>
          <rect x="40" y="124" width="320" height="14" fill="#666" rx="2"/>
          <rect x="40" y="148" width="160" height="36" fill="#FF4D17" rx="2"/>
          <!-- Hero image stand-in -->
          <rect x="600" y="40" width="220" height="160" fill="#888" rx="4"/>
        </g>

        <!-- Cards row -->
        <g transform="translate(0,296)">
          <rect width="860" height="200" fill="#fff"/>
          <rect x="40" y="40" width="240" height="120" fill="#F4F4F2" rx="4"/>
          <rect x="60" y="60" width="80" height="10" fill="#888" rx="1"/>
          <rect x="60" y="78" width="160" height="14" fill="#0A0C0E" rx="1"/>
          <rect x="60" y="100" width="200" height="8" fill="#666" rx="1"/>
          <rect x="60" y="112" width="160" height="8" fill="#666" rx="1"/>

          <rect x="310" y="40" width="240" height="120" fill="#F4F4F2" rx="4"/>
          <rect x="330" y="60" width="80" height="10" fill="#888" rx="1"/>
          <rect x="330" y="78" width="160" height="14" fill="#0A0C0E" rx="1"/>
          <rect x="330" y="100" width="200" height="8" fill="#666" rx="1"/>
          <rect x="330" y="112" width="160" height="8" fill="#666" rx="1"/>

          <rect x="580" y="40" width="240" height="120" fill="#F4F4F2" rx="4"/>
          <rect x="600" y="60" width="80" height="10" fill="#888" rx="1"/>
          <rect x="600" y="78" width="160" height="14" fill="#0A0C0E" rx="1"/>
          <rect x="600" y="100" width="200" height="8" fill="#666" rx="1"/>
          <rect x="600" y="112" width="160" height="8" fill="#666" rx="1"/>
        </g>

        <!-- Footer block -->
        <g transform="translate(0,496)">
          <rect width="860" height="104" fill="#1A1C1E"/>
          <rect x="40" y="30" width="180" height="8" fill="#fff" opacity="0.4" rx="1"/>
          <rect x="40" y="46" width="120" height="8" fill="#fff" opacity="0.3" rx="1"/>
        </g>
      </g>

      <!-- ===== PINNED ANNOTATIONS (the killer feature) ===== -->
      <!-- Pin 1: on logo, resolved -->
      <g transform="translate(40,116)">
        <circle r="14" fill="#10b981" stroke="#fff" stroke-width="2"/>
        <text y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">1</text>
      </g>

      <!-- Pin 2: on hero CTA, open -->
      <g transform="translate(140,260)">
        <circle r="16" fill="#FF4D17" stroke="#fff" stroke-width="2">
          <animate attributeName="r" values="16;20;16" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <text y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">2</text>
      </g>

      <!-- Pin 3: on hero image, open -->
      <g transform="translate(700,180)">
        <circle r="14" fill="#FF4D17" stroke="#fff" stroke-width="2"/>
        <text y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">3</text>
      </g>

      <!-- Pin 4: on middle card, resolved -->
      <g transform="translate(380,420)">
        <circle r="14" fill="#10b981" stroke="#fff" stroke-width="2"/>
        <text y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">4</text>
      </g>

      <!-- Pin 5: on footer, open -->
      <g transform="translate(80,580)">
        <circle r="14" fill="#10b981" stroke="#fff" stroke-width="2"/>
        <text y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">5</text>
      </g>

      <!-- Active pin tooltip (pin 2) -->
      <g transform="translate(160,200)">
        <rect width="240" height="86" rx="6" fill="#0A0C0E" stroke="#FF4D17" stroke-width="1"/>
        <polygon points="20,86 30,86 25,96" fill="#0A0C0E" stroke="#FF4D17" stroke-width="1"/>
        <text x="14" y="20" font-family="-apple-system,sans-serif" font-size="10" fill="#FF4D17" letter-spacing="0.14em" font-weight="700">PIN #2 · CLIENT</text>
        <text x="14" y="44" font-family="-apple-system,sans-serif" font-size="12" fill="#fff" font-weight="500">Can the CTA be a touch</text>
        <text x="14" y="60" font-family="-apple-system,sans-serif" font-size="12" fill="#fff" font-weight="500">larger? Looks small on retina.</text>
        <text x="14" y="78" font-family="-apple-system,sans-serif" font-size="10" fill="#888">Sarah K. · 2 hours ago</text>
      </g>
    </g>

    <!-- Right: comment thread + actions panel -->
    <g transform="translate(960,140)">
      <rect width="448" height="660" rx="6" fill="#1A1C1E"/>

      <!-- Tab strip -->
      <g transform="translate(0,0)">
        <rect width="448" height="44" fill="none"/>
        <line x1="0" y1="43" x2="448" y2="43" stroke="rgba(255,255,255,0.1)"/>
        <text x="20" y="28" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="600">Comments (5)</text>
        <line x1="20" y1="43" x2="120" y2="43" stroke="#FF4D17" stroke-width="2"/>
        <text x="142" y="28" font-family="-apple-system,sans-serif" font-size="13" fill="#888">Versions (3)</text>
        <text x="240" y="28" font-family="-apple-system,sans-serif" font-size="13" fill="#888">Activity</text>
        <text x="320" y="28" font-family="-apple-system,sans-serif" font-size="13" fill="#888">Files</text>
      </g>

      <!-- Comment list -->
      <g transform="translate(20,68)" font-family="-apple-system,sans-serif">
        <!-- Comment 1 (resolved) -->
        <g>
          <circle cx="14" cy="14" r="14" fill="#10b981"/>
          <text x="14" y="19" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">1</text>
          <text x="36" y="14" font-size="11" fill="#10b981" letter-spacing="0.14em" font-weight="700">RESOLVED</text>
          <text x="36" y="34" font-size="13" fill="#fff" font-weight="500">Logo size – fixed in v2</text>
          <text x="36" y="52" font-size="11" fill="#888">Sarah K. · Mark T. · 4 messages</text>
        </g>
        <!-- Comment 2 (active, expanded) -->
        <g transform="translate(0,82)">
          <rect x="-10" y="-12" width="420" height="100" rx="4" fill="rgba(255,77,23,0.06)"/>
          <circle cx="14" cy="14" r="14" fill="#FF4D17"/>
          <text x="14" y="19" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">2</text>
          <text x="36" y="14" font-size="11" fill="#FF4D17" letter-spacing="0.14em" font-weight="700">OPEN · CLIENT</text>
          <text x="36" y="34" font-size="13" fill="#fff">Can the CTA be a touch larger?</text>
          <text x="36" y="50" font-size="13" fill="#fff">Looks small on retina.</text>
          <text x="36" y="74" font-size="11" fill="#888">Sarah K. · 2 hours ago · click to reply</text>
        </g>
        <!-- Comment 3 -->
        <g transform="translate(0,196)">
          <circle cx="14" cy="14" r="14" fill="#FF4D17"/>
          <text x="14" y="19" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">3</text>
          <text x="36" y="14" font-size="11" fill="#FF4D17" letter-spacing="0.14em" font-weight="700">OPEN · CLIENT</text>
          <text x="36" y="34" font-size="13" fill="#fff">Can we try a darker hero image?</text>
          <text x="36" y="52" font-size="11" fill="#888">Sarah K. · 1 hour ago</text>
        </g>
        <!-- Comment 4 -->
        <g transform="translate(0,254)">
          <circle cx="14" cy="14" r="14" fill="#10b981"/>
          <text x="14" y="19" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">4</text>
          <text x="36" y="14" font-size="11" fill="#10b981" letter-spacing="0.14em" font-weight="700">RESOLVED</text>
          <text x="36" y="34" font-size="13" fill="#fff" font-weight="500">Card spacing — increased to 32px</text>
          <text x="36" y="52" font-size="11" fill="#888">Mark T. · 30 min ago</text>
        </g>
        <!-- Comment 5 -->
        <g transform="translate(0,312)">
          <circle cx="14" cy="14" r="14" fill="#10b981"/>
          <text x="14" y="19" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">5</text>
          <text x="36" y="14" font-size="11" fill="#10b981" letter-spacing="0.14em" font-weight="700">RESOLVED</text>
          <text x="36" y="34" font-size="13" fill="#fff" font-weight="500">Footer logo — replaced with vector</text>
          <text x="36" y="52" font-size="11" fill="#888">Mark T. · 18 min ago</text>
        </g>
      </g>

      <!-- Decision buttons -->
      <g transform="translate(20,500)">
        <rect width="408" height="44" rx="4" fill="#10b981"/>
        <text x="204" y="28" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700" letter-spacing="0.14em">✓ APPROVE THIS ROUND</text>
      </g>
      <g transform="translate(20,556)">
        <rect width="408" height="44" rx="4" fill="none" stroke="rgba(255,255,255,0.15)"/>
        <text x="204" y="28" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="600" letter-spacing="0.14em">REQUEST CHANGES (ROUND 3)</text>
      </g>
      <g transform="translate(20,612)">
        <rect width="408" height="32" rx="4" fill="none"/>
        <text x="204" y="20" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#888">⌘+Return to approve · audit-trailed with timestamp + IP</text>
      </g>
    </g>
  </g>

  <text x="800" y="970" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.18em">CLIENT APPROVALS HUB · PINNED ANNOTATIONS · BREAKPOINT PREVIEW · TOKEN-LINK ACCESS</text>
</svg>
