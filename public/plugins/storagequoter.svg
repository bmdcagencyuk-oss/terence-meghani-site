<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="StorageQuoter — quote calculator preview">
  <title>StorageQuoter — multi-step quote calculator preview</title>

  <defs>
    <linearGradient id="sq-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2122"/>
      <stop offset="1" stop-color="#16181a"/>
    </linearGradient>
    <filter id="sq-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sq-cta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD933"/><stop offset="1" stop-color="#F5C800"/>
    </linearGradient>
  </defs>

  <!-- Stage -->
  <rect width="1600" height="1000" fill="url(#sq-bg)"/>

  <!-- Browser chrome (suggests "this runs on a real site") -->
  <g transform="translate(120,90)">
    <rect width="1360" height="820" rx="14" ry="14" fill="#0E1011" stroke="rgba(255,255,255,0.08)" filter="url(#sq-shadow)"/>
    <!-- Title bar -->
    <rect width="1360" height="44" rx="14" ry="14" fill="#1A1C1E"/>
    <rect y="22" width="1360" height="22" fill="#1A1C1E"/>
    <circle cx="22" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="44" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="66" cy="22" r="6" fill="#28C840"/>
    <rect x="430" y="11" width="500" height="22" rx="4" fill="#0E1011"/>
    <text x="680" y="27" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="11" fill="#888" letter-spacing="0.04em">storage-operator-site.co.uk/quote</text>

    <!-- Plugin mount point -->
    <g transform="translate(40,84)">
      <!-- Step bar (the v23 multi-step navigation) -->
      <g>
        <rect width="1280" height="56" fill="#1C1C1C" rx="4"/>
        <!-- Step 1: done -->
        <rect width="320" height="56" fill="#F5C800" rx="4"/>
        <text x="32" y="26" font-family="-apple-system,sans-serif" font-size="11" fill="#888" font-weight="600" letter-spacing="0.08em">STEP 1 · DONE</text>
        <text x="32" y="44" font-family="-apple-system,sans-serif" font-size="13" fill="#111" font-weight="600">Nottingham</text>
        <!-- Step 2: active -->
        <rect x="320" width="320" height="56" fill="#0E1011"/>
        <rect x="320" width="320" height="3" y="53" fill="#F5C800"/>
        <text x="352" y="26" font-family="-apple-system,sans-serif" font-size="11" fill="#888" font-weight="600" letter-spacing="0.08em">STEP 2 · ACTIVE</text>
        <text x="352" y="44" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="600">Choose unit type</text>
        <!-- Step 3 -->
        <rect x="640" width="320" height="56" fill="#1C1C1C"/>
        <text x="672" y="26" font-family="-apple-system,sans-serif" font-size="11" fill="#666" font-weight="500" letter-spacing="0.08em">STEP 3</text>
        <text x="672" y="44" font-family="-apple-system,sans-serif" font-size="13" fill="#888" font-weight="500">Pick a unit</text>
        <!-- Step 4 -->
        <rect x="960" width="320" height="56" fill="#1C1C1C"/>
        <text x="992" y="26" font-family="-apple-system,sans-serif" font-size="11" fill="#666" font-weight="500" letter-spacing="0.08em">STEP 4</text>
        <text x="992" y="44" font-family="-apple-system,sans-serif" font-size="13" fill="#888" font-weight="500">Get your quote</text>
      </g>

      <!-- Unit-type carousel (the active step) -->
      <g transform="translate(0,90)">
        <!-- Tab strip -->
        <g font-family="-apple-system,sans-serif" font-size="14" font-weight="600">
          <rect width="1280" height="58" fill="#0E1011" rx="2"/>
          <!-- Selected: Indoor Storage -->
          <rect x="40" width="180" height="58" fill="#1A1C1E"/>
          <rect x="40" y="55" width="180" height="3" fill="#E8003D"/>
          <text x="130" y="35" text-anchor="middle" fill="#fff">Indoor</text>
          <text x="130" y="50" text-anchor="middle" fill="#888" font-size="11" font-weight="500">12 units</text>
          <!-- Outdoor -->
          <text x="350" y="35" text-anchor="middle" fill="#888">Outdoor</text>
          <text x="350" y="50" text-anchor="middle" fill="#666" font-size="11" font-weight="500">8 units</text>
          <!-- Drive-up -->
          <text x="550" y="35" text-anchor="middle" fill="#888">Drive-up</text>
          <text x="550" y="50" text-anchor="middle" fill="#666" font-size="11" font-weight="500">6 units</text>
          <!-- Vehicle -->
          <text x="730" y="35" text-anchor="middle" fill="#888">Vehicle</text>
          <text x="730" y="50" text-anchor="middle" fill="#666" font-size="11" font-weight="500">4 units</text>
        </g>

        <!-- Unit cards (3 visible) -->
        <g transform="translate(0,90)" font-family="-apple-system,sans-serif">
          <!-- Card 1 (selected/featured) -->
          <g>
            <rect x="40" width="380" height="450" fill="#1A1C1E" rx="6" stroke="#E8003D" stroke-width="2"/>
            <rect x="40" width="380" height="220" fill="#2A2C2E" rx="6"/>
            <!-- Image stand-in: simple isometric box -->
            <g transform="translate(180,90) scale(0.9)">
              <polygon points="0,40 60,10 120,40 60,70" fill="#3A3C3E" stroke="#555" stroke-width="1.5"/>
              <polygon points="0,40 0,90 60,120 60,70" fill="#2D2F31" stroke="#555" stroke-width="1.5"/>
              <polygon points="120,40 120,90 60,120 60,70" fill="#252729" stroke="#555" stroke-width="1.5"/>
            </g>
            <text x="60" y="262" font-size="11" fill="#888" letter-spacing="0.12em" font-weight="600">UNIT · IND-15</text>
            <text x="60" y="296" font-size="22" fill="#fff" font-weight="600">15 sq ft</text>
            <text x="60" y="320" font-size="13" fill="#888">5' × 3' × 8' · ground floor</text>
            <text x="60" y="378" font-size="36" fill="#fff" font-weight="600">£72</text>
            <text x="60" y="398" font-size="11" fill="#888" letter-spacing="0.08em">PER MONTH</text>
            <!-- CTA -->
            <rect x="60" y="408" width="340" height="30" fill="url(#sq-cta)" rx="3"/>
            <text x="230" y="428" text-anchor="middle" font-size="13" fill="#111" font-weight="600" letter-spacing="0.08em">CHECK AVAILABILITY</text>
          </g>
          <!-- Card 2 -->
          <g>
            <rect x="450" width="380" height="450" fill="#1A1C1E" rx="6" stroke="rgba(255,255,255,0.08)"/>
            <rect x="450" width="380" height="220" fill="#1F2123" rx="6"/>
            <g transform="translate(590,80) scale(1.1)">
              <polygon points="0,40 60,10 120,40 60,70" fill="#2A2C2E" stroke="#444" stroke-width="1.5"/>
              <polygon points="0,40 0,90 60,120 60,70" fill="#1F2123" stroke="#444" stroke-width="1.5"/>
              <polygon points="120,40 120,90 60,120 60,70" fill="#1A1C1E" stroke="#444" stroke-width="1.5"/>
            </g>
            <text x="470" y="262" font-size="11" fill="#888" letter-spacing="0.12em" font-weight="600">UNIT · IND-25</text>
            <text x="470" y="296" font-size="22" fill="#fff" font-weight="600">25 sq ft</text>
            <text x="470" y="320" font-size="13" fill="#888">5' × 5' × 8' · ground floor</text>
            <text x="470" y="378" font-size="36" fill="#fff" font-weight="600">£98</text>
            <text x="470" y="398" font-size="11" fill="#888" letter-spacing="0.08em">PER MONTH</text>
            <rect x="470" y="408" width="340" height="30" fill="none" stroke="rgba(255,255,255,0.2)" rx="3"/>
            <text x="640" y="428" text-anchor="middle" font-size="13" fill="#fff" font-weight="600" letter-spacing="0.08em">CHECK AVAILABILITY</text>
          </g>
          <!-- Card 3 -->
          <g>
            <rect x="860" width="380" height="450" fill="#1A1C1E" rx="6" stroke="rgba(255,255,255,0.08)"/>
            <rect x="860" width="380" height="220" fill="#1F2123" rx="6"/>
            <g transform="translate(990,70) scale(1.3)">
              <polygon points="0,40 60,10 120,40 60,70" fill="#2A2C2E" stroke="#444" stroke-width="1.5"/>
              <polygon points="0,40 0,90 60,120 60,70" fill="#1F2123" stroke="#444" stroke-width="1.5"/>
              <polygon points="120,40 120,90 60,120 60,70" fill="#1A1C1E" stroke="#444" stroke-width="1.5"/>
            </g>
            <text x="880" y="262" font-size="11" fill="#888" letter-spacing="0.12em" font-weight="600">UNIT · IND-50</text>
            <text x="880" y="296" font-size="22" fill="#fff" font-weight="600">50 sq ft</text>
            <text x="880" y="320" font-size="13" fill="#888">10' × 5' × 8' · first floor</text>
            <text x="880" y="378" font-size="36" fill="#fff" font-weight="600">£165</text>
            <text x="880" y="398" font-size="11" fill="#888" letter-spacing="0.08em">PER MONTH</text>
            <rect x="880" y="408" width="340" height="30" fill="none" stroke="rgba(255,255,255,0.2)" rx="3"/>
            <text x="1050" y="428" text-anchor="middle" font-size="13" fill="#fff" font-weight="600" letter-spacing="0.08em">CHECK AVAILABILITY</text>
          </g>
        </g>
      </g>
    </g>

    <!-- Plugin badge bottom-right -->
    <g transform="translate(1180,770)">
      <rect width="180" height="36" fill="#FF4D17" rx="2"/>
      <text x="90" y="22" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="#fff" font-weight="600" letter-spacing="0.16em">STORAGEQUOTER</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="800" y="970" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.18em">QUOTE CALCULATOR PREVIEW · MULTI-STEP · MULTI-LOCATION</text>
</svg>
